<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus — AI Voice ERP</title>
    <meta name="theme-color" content="#4f46e5">
    <meta name="description" content="Nexus is a secure, multi-tenant AI voice ERP for modern businesses.">
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/src/css/style.css">
</head>
<body>
    <div id="app-root">
        <!-- Main Application Content Will Load Here -->
        <div class="d-flex justify-content-center align-items-center vh-100 bg-light-gradient">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
    
    <!-- Company Registration Modal -->
    <div class="modal fade" id="registerCompanyModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 12px;">
          <div class="modal-header border-bottom-0 pb-0">
            <h5 class="modal-title fw-bold">Register New Company</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4" id="register-modal-body">
            <!-- Dynamic steps will be rendered here by JS -->
          </div>
        </div>
      </div>
    </div>

    <!-- Floating AI Voice Button -->
    <button id="voice-btn" class="btn btn-primary voice-floating-btn" title="AI Voice Assistant" hidden>
        <i class="bi bi-mic-fill fs-4"></i>
    </button>

    <!-- Centralized AI Assistant Offcanvas Modal -->
    <div class="modal fade" id="aiAssistantModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 16px; overflow: hidden;">
          <div class="modal-header bg-dark text-white p-3 border-bottom border-secondary">
            <div class="d-flex align-items-center gap-2">
              <span class="badge bg-primary p-2 fs-6 rounded-circle"><i class="bi bi-robot"></i></span>
              <div>
                <h5 class="modal-title mb-0 fw-bold fs-6">Nexus Intelligence Assistant</h5>
                <small class="text-white-50" style="font-size:0.75rem"><i class="bi bi-cpu me-1"></i>OpenRouter AI Engine • Multi-Tenant RBAC Secure</small>
              </div>
            </div>
            <div class="d-flex align-items-center gap-2">
              <div class="form-check form-switch text-white me-2 mb-0" title="Toggle Voice Response">
                <input class="form-check-input" type="checkbox" id="ai-tts-toggle" checked>
                <label class="form-check-label small text-white-50" for="ai-tts-toggle"><i class="bi bi-volume-up-fill"></i></label>
              </div>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
          </div>
          <div class="modal-body p-3 bg-light" style="max-height: 420px; overflow-y: auto;" id="ai-chat-messages">
            <div class="text-center my-3 text-muted">
              <i class="bi bi-stars text-primary fs-3 d-block mb-1"></i>
              <p class="small mb-1">Ask me anything about your ERP workspace!</p>
              <div class="d-flex flex-wrap justify-content-center gap-2 mt-3" id="ai-quick-chips">
                <button class="btn btn-sm btn-outline-primary rounded-pill pill-chip" onclick="sendAiPrompt('Show today sales summary')"><i class="bi bi-graph-up me-1"></i>Today's Sales</button>
                <button class="btn btn-sm btn-outline-danger rounded-pill pill-chip" onclick="sendAiPrompt('Check pending unpaid invoices')"><i class="bi bi-receipt me-1"></i>Pending Invoices</button>
                <button class="btn btn-sm btn-outline-warning rounded-pill pill-chip" onclick="sendAiPrompt('Check low stock inventory')"><i class="bi bi-box-seam me-1"></i>Low Stock Alert</button>
                <button class="btn btn-sm btn-outline-info rounded-pill pill-chip" onclick="sendAiPrompt('Show employee attendance register')"><i class="bi bi-people me-1"></i>Attendance</button>
                <button class="btn btn-sm btn-outline-success rounded-pill pill-chip" onclick="sendAiPrompt('Generate executive financial report')"><i class="bi bi-file-earmark-bar-graph me-1"></i>Financial Report</button>
              </div>
            </div>
          </div>
          <div class="modal-footer p-2 bg-white border-top">
            <div id="ai-voice-status" class="w-100 text-center text-primary small mb-1 d-none">
              <span class="spinner-grow spinner-grow-sm me-1"></span> Listening for voice command… Speak clearly into microphone.
            </div>
            <form id="ai-chat-form" class="w-100 d-flex gap-2">
              <button type="button" id="ai-mic-btn" class="btn btn-outline-primary rounded-circle" style="width:42px;height:42px;" title="Voice Dictation">
                <i class="bi bi-mic-fill"></i>
              </button>
              <input id="ai-chat-input" class="form-control" placeholder="Ask AI voice assistant or type a command..." autocomplete="off">
              <button type="submit" class="btn btn-primary px-3"><i class="bi bi-send-fill"></i></button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/src/js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(registration => console.log('SW registered'))
                .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
