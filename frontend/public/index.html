<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus — AI Voice ERP</title>
    <meta name="theme-color" content="#4f46e5">
    <meta name="description" content="Nexus is a secure, multi-tenant AI voice ERP for modern businesses.">
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/src/css/style.css">
</head>
<body>
    <div id="app-root">
        <!-- Main Application Content Will Load Here -->
        <div class="d-flex justify-content-center align-items-center vh-100 bg-light-gradient">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
    
    <!-- Company Registration Modal -->
    <div class="modal fade" id="registerCompanyModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 12px;">
          <div class="modal-header border-bottom-0 pb-0">
            <h5 class="modal-title fw-bold">Register New Company</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4" id="register-modal-body">
            <!-- Dynamic steps will be rendered here by JS -->
          </div>
        </div>
      </div>
    </div>

    <!-- Floating AI Voice Button -->
    <button id="voice-btn" class="btn btn-primary voice-floating-btn" title="AI Voice Assistant" hidden>
        <i class="bi bi-mic-fill fs-4"></i>
    </button>    <!-- Cute & Compact Floating AI Voice Assistant Widget -->
    <div id="aiAssistantPopup" class="cute-ai-widget d-none">
      <div class="cute-ai-card">
        <div class="cute-ai-header d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center gap-2">
            <div class="cute-avatar"><i class="bi bi-robot"></i></div>
            <div>
              <h6 class="mb-0 text-white fw-bold" style="font-size: 0.9rem;">Nova AI 🌸</h6>
              <small class="text-white-50" style="font-size: 0.7rem;"><i class="bi bi-heart-fill text-danger me-1"></i>Female Voice Assistant</small>
            </div>
          </div>
          <div class="d-flex align-items-center gap-1">
            <div class="form-check form-switch text-white me-1 mb-0" title="Female Voice TTS">
              <input class="form-check-input" type="checkbox" id="ai-tts-toggle" checked>
            </div>
            <button type="button" class="btn-close btn-close-white btn-sm" onclick="toggleVoiceAssistant()"></button>
          </div>
        </div>
        
        <div class="cute-ai-body" id="ai-chat-messages">
          <div class="text-center my-2 text-muted">
            <span class="fs-4">✨</span>
            <p class="small text-secondary mb-2" style="font-size:0.8rem;">Hi! I'm Nova. How can I help you today?</p>
            <div class="d-flex flex-wrap justify-content-center gap-1" id="ai-quick-chips">
              <button class="btn btn-sm cute-chip" onclick="sendAiPrompt('Show today sales summary')">📈 Sales</button>
              <button class="btn btn-sm cute-chip" onclick="sendAiPrompt('Check pending unpaid invoices')">🧾 Bills</button>
              <button class="btn btn-sm cute-chip" onclick="sendAiPrompt('Check low stock inventory')">📦 Stock</button>
              <button class="btn btn-sm cute-chip" onclick="sendAiPrompt('Show employee attendance register')">👥 Staff</button>
            </div>
          </div>
        </div>

        <div class="cute-ai-footer">
          <div id="ai-voice-status" class="cute-listening-bar d-none">
            <span class="pulse-dot me-1"></span> Listening… Auto-send in <strong id="voice-timer-count">4</strong>s
          </div>
          <form id="ai-chat-form" class="d-flex gap-2 align-items-center">
            <button type="button" id="ai-mic-btn" class="btn cute-mic-btn" title="Click to talk (Listens 5s)">
              <i class="bi bi-mic-fill"></i>
            </button>
            <input id="ai-chat-input" class="form-control cute-input" placeholder="Type or tap mic..." autocomplete="off">
            <button type="submit" class="btn cute-send-btn"><i class="bi bi-send-fill"></i></button>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/src/js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(registration => console.log('SW registered'))
                .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
