<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4f46e5">
  <title>Nexus Offline</title>
  <link rel="icon" href="/assets/icon.svg" type="image/svg+xml">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(99,102,241,.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(20,184,166,.14), transparent 26%),
        #0f172a;
      color: #e2e8f0;
      padding: 1.5rem;
    }
    .card {
      width: min(520px, 100%);
      padding: 2rem;
      border-radius: 24px;
      border: 1px solid rgba(148,163,184,.18);
      background: rgba(15,23,42,.72);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(15,23,42,.4);
    }
    .brand { display:flex; align-items:center; gap:.85rem; margin-bottom:1.25rem; }
    .logo {
      width: 48px; height: 48px; border-radius: 16px;
      background: linear-gradient(135deg, #6366f1, #14b8a6);
      display:grid; place-items:center; color:#fff; font-weight:800; font-size:1.1rem;
      box-shadow: 0 18px 40px rgba(99,102,241,.25);
    }
    h1 { margin: 0 0 .5rem; font-size: 1.9rem; letter-spacing: -.04em; }
    p { margin: .35rem 0; color: #94a3b8; line-height: 1.65; }
    .actions { display:flex; gap:.75rem; flex-wrap:wrap; margin-top:1.5rem; }
    .btn {
      appearance:none; border:0; border-radius: 14px; padding:.8rem 1rem; cursor:pointer;
      font-weight:700; text-decoration:none; display:inline-flex; align-items:center; justify-content:center;
    }
    .primary { background:#6366f1; color:#fff; }
    .secondary { background: rgba(148,163,184,.12); color:#e2e8f0; border:1px solid rgba(148,163,184,.16); }
    .status { display:inline-flex; align-items:center; gap:.45rem; margin-top:.9rem; color:#34d399; font-size:.92rem; font-weight:600; }
    .dot { width:.55rem; height:.55rem; border-radius:999px; background:currentColor; }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <div class="logo">N</div>
      <div>
        <strong style="display:block; font-size:1.05rem; color:#fff;">Nexus</strong>
        <span style="color:#94a3b8; font-size:.85rem;">AI Voice ERP</span>
      </div>
    </div>
    <h1>You’re offline.</h1>
    <p>The workspace is still available from cache. Once your connection returns, data and actions will sync again.</p>
    <div class="status"><span class="dot"></span> Cached experience ready</div>
    <div class="actions">
      <a class="btn primary" href="/index.html">Reload app</a>
      <button class="btn secondary" onclick="location.reload()">Try again</button>
    </div>
  </main>
</body>
</html>
